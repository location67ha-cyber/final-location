<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin · Réservations</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style-admin.css">
</head>
<body>
    <div id="admin-content">
        <header>
            <h2>Gestion des réservations</h2>
            <div class="header-user">
                <span id="user-email"></span>
                <span id="user-role" class="user-role-badge"></span>
                <button id="btn-logout" class="btn-logout">Déconnexion</button>
            </div>
        </header>
        <main>
            <nav>
                <a href="admin.html" class="tab-btn"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                <a href="admin-reservations.html" class="tab-btn active"><i class="fas fa-calendar-check"></i> Réservations</a>
                <a href="admin-maintenance.html" class="tab-btn"><i class="fas fa-tools"></i> Maintenance</a>
                <a href="admin-clients.html" class="tab-btn"><i class="fas fa-users"></i> Clients</a>
            </nav>
            <div class="content-area">
                <div class="filters-bar">
                    <select id="filter-status"><option value="">Tous les statuts</option><option value="en_attente">En attente</option><option value="acompte_paye">Acompte payé</option><option value="valide">Validée</option><option value="annulee">Annulée</option></select>
                    <select id="filter-voiture"><option value="">Toutes les voitures</option></select>
                    <input type="date" id="filter-date">
                </div>
                <table style="margin-top: 20px;">
                    <thead>
                        <tr>
                            <th># / Statut</th>
                            <th>Client</th>
                            <th>Voiture & Dates</th>
                            <th>Finances</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="reservations-body">
                        <tr><td colspan="5">Chargement…</td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Modale pour modifier une réservation -->
    <div id="modal-edit-resa" class="modal-overlay">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal('modal-edit-resa')">&times;</span>
            <h3>Modifier réservation</h3>
            <input type="hidden" id="edit-resa-id">
            <p><strong>Client :</strong> <span id="edit-resa-client"></span></p>
            <div class="grid-form">
                <div><label>Date début</label><input type="date" id="edit-resa-debut"></div>
                <div><label>Date fin</label><input type="date" id="edit-resa-fin"></div>
                <div><label>Montant total</label><input type="number" id="edit-resa-montant"></div>
                <div><label>Montant payé</label><input type="number" id="edit-resa-paye"></div>
                <div><label>Remise</label><input type="number" id="edit-resa-remise" value="0"></div>
                <div><label>Statut</label><select id="edit-resa-statut"><option value="en_attente">En attente</option><option value="acompte_paye">Acompte payé</option><option value="valide">Validée</option><option value="annulee">Annulée</option></select></div>
            </div>
            <button class="btn-full" onclick="sauvegarderModificationResa()">Mettre à jour</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="common.js"></script>
    <script src="admin-reservations.js"></script>
</body>
</html>
