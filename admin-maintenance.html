<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin · Maintenance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style-admin.css">
</head>
<body>
    <div id="admin-content">
        <header>
            <h2>Maintenance de la flotte</h2>
            <div class="header-user">
                <span id="user-email"></span>
                <span id="user-role" class="user-role-badge"></span>
                <button id="btn-logout" class="btn-logout">Déconnexion</button>
            </div>
        </header>
        <main>
            <nav>
                <a href="admin.html" class="tab-btn"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                <a href="admin-reservations.html" class="tab-btn"><i class="fas fa-calendar-check"></i> Réservations</a>
                <a href="admin-maintenance.html" class="tab-btn active"><i class="fas fa-tools"></i> Maintenance</a>
                <a href="admin-clients.html" class="tab-btn"><i class="fas fa-users"></i> Clients</a>
            </nav>
            <div class="content-area">
                <button class="btn-full btn-primaire" onclick="openMaintenanceModal()">+ Nouvelle intervention</button>
                <table style="margin-top: 20px;">
                    <thead>
                        <tr>
                            <th>Voiture</th>
                            <th>Type</th>
                            <th>Date</th>
                            <th>Statut</th>
                            <th>Coût</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="maintenance-body">
                        <tr><td colspan="6">Chargement…</td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Modale pour une intervention -->
    <div id="maintenance-modal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal('maintenance-modal')">&times;</span>
            <h3 id="maintenance-modal-title">Nouvelle intervention</h3>
            <form id="maintenance-form" onsubmit="saveIntervention(event)">
                <div class="grid-form">
                    <div><label>Voiture</label><select id="maintenance-voiture-select" required></select></div>
                    <div><label>Type d'intervention</label><input type="text" id="maintenance-type" required></div>
                    <div><label>Date prévue</label><input type="date" id="maintenance-date" required></div>
                    <div><label>Coût estimé (Ar)</label><input type="number" id="maintenance-cost"></div>
                    <div><label>Statut</label><select id="maintenance-state"><option value="planifiee">Planifiée</option><option value="en_cours">En cours</option><option value="terminee">Terminée</option></select></div>
                </div>
                <div><label>Description</label><textarea id="maintenance-notes" rows="3"></textarea></div>
                <p id="maintenance-feedback"></p>
                <button type="submit" class="btn-full">Enregistrer</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="common.js"></script>
    <script src="admin-maintenance.js"></script>
</body>
</html>
